<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Web Inspector Sandbox</title>
<script>
    if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('Service Worker registrado correctamente'))
      .catch(err => console.log('Error al registrar:', err));
  }
</script>

<!-- No olvides vincular el manifest en el <head> -->
<link rel="manifest" href="manifest.json">    
<style>
    body {
        margin: 0;
        font-family: monospace;
        background: #0f0f0f;
        color: #00ff9d;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #topbar {
        display: flex;
        padding: 10px;
        background: #111;
        gap: 10px;
        border-bottom: 1px solid #222;
    }

    input {
        flex: 1;
        padding: 8px;
        background: #000;
        color: #00ff9d;
        border: 1px solid #333;
        outline: none;
    }

    button {
        padding: 8px 12px;
        background: #00ff9d;
        border: none;
        cursor: pointer;
        font-weight: bold;
    }

    #container {
        display: flex;
        flex: 1;
        overflow: hidden;
    }

    #left, #right {
        flex: 1;
        overflow: auto;
        border-right: 1px solid #222;
    }

    #right {
        border-right: none;
    }

    textarea {
        width: 100%;
        height: 100%;
        background: #000;
        color: #00ff9d;
        border: none;
        outline: none;
        padding: 10px;
        resize: none;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }

    #status {
        font-size: 12px;
        color: #aaa;
        padding: 5px 10px;
        border-top: 1px solid #222;
    }

    .label {
        font-size: 11px;
        color: #888;
        margin-bottom: 5px;
    }
</style>
</head>

<body>

<div id="topbar">
    <input id="url" placeholder="Enter URL (https://example.com)" />
    <button onclick="loadSite()">Inspect</button>
    <button onclick="applyEdit()">Apply Code</button>
</div>

<div id="container">
    <div id="left">
        <div class="label">HTML CODE (editable if allowed / sandboxed copy)</div>
        <textarea id="code" placeholder="Site code will appear here..."></textarea>
    </div>

    <div id="right">
        <iframe id="frame"></iframe>
    </div>
</div>

<div id="status">Ready.</div>

<script>
let currentMode = "sandbox";

async function loadSite() {
    const url = document.getElementById("url").value;
    const frame = document.getElementById("frame");
    const codeBox = document.getElementById("code");
    const status = document.getElementById("status");

    if (!url) return;

    status.innerText = "Loading...";

    try {
        // Try fetching HTML (ONLY works if CORS allows it)
        const res = await fetch(url, { mode: "cors" });
        const html = await res.text();

        codeBox.value = html;
        frame.srcdoc = html;

        currentMode = "editable-copy";
        status.innerText = "Loaded via CORS (editable sandbox copy).";

    } catch (e) {
        // Fallback: iframe only (no code access)
        frame.src = url;
        codeBox.value =
`// CORS BLOCKED ❌
// This site does not allow reading its HTML.
//
// You can still:
 // - View it in the iframe (right side)
 // - Paste modified HTML here manually
 // - Or recreate a sandbox version

console.log("No access due to browser security rules.");`;

        currentMode = "iframe-only";
        status.innerText = "CORS blocked. Running iframe-only mode.";
    }
}

function applyEdit() {
    const frame = document.getElementById("frame");
    const code = document.getElementById("code");
    const status = document.getElementById("status");

    if (currentMode === "iframe-only") {
        frame.srcdoc = code.value;
        status.innerText = "Applied edits to sandbox (not original site).";
    } else {
        frame.srcdoc = code.value;
        status.innerText = "Live sandbox updated.";
    }
}
</script>

</body>
</html>
